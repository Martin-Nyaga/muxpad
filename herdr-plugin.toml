id = "muxpad"
name = "Muxpad"
version = "0.1.0"
description = "Muxpad task launcher for Herdr."
min_herdr_version = "0.7.1"
platforms = ["linux", "macos"]

# Bind this action in ~/.config/herdr/config.toml, for example:
# [[keys.command]]
# key = "prefix+down"
# type = "plugin_action"
# command = "muxpad.launch-hardcoded"
# description = "Muxpad: Launch hardcoded task"

# On `herdr plugin install`, Herdr runs this build step from the plugin root and
# produces the action binary. Requires the Go toolchain on PATH. For local
# `herdr plugin link` (which skips build steps), build it yourself first:
#   go build -o dist/muxpad-herdr ./cmd/muxpad-herdr
[[build]]
command = ["go", "build", "-o", "dist/muxpad-herdr", "./cmd/muxpad-herdr"]

[[actions]]
id = "launch-hardcoded"
title = "Muxpad: Launch hardcoded task"
description = "Create a Herdr tab and run the walking-skeleton command in its real shell."
contexts = ["global", "workspace", "tab", "pane"]
# Resolve the built binary via the absolute HERDR_PLUGIN_ROOT that Herdr injects.
# A bare name would need it on PATH; a relative program path is ambiguous once
# Herdr sets the child's working directory (Rust flags this as platform-specific).
command = ["sh", "-c", 'exec "$HERDR_PLUGIN_ROOT/dist/muxpad-herdr" launch-hardcoded']
